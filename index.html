<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
    overflow: hidden;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>

<video autoplay muted playsinline>
  <source src="HYDRA 2026 (1)".mp4" type="HYDRA 2026 (1).mp4">
</video>

<script>
  const video = document.querySelector("video");

  // força tela cheia ao tocar
  document.body.addEventListener("click", () => {
    if (video.requestFullscreen) {
      video.requestFullscreen();
    }
    video.muted = false;
    video.play();
  });
</script>

</body>
</html>
