<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vídeo</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>

<video autoplay muted playsinline loop>
  <source src="video.mp4" type="sao jorge/mp4">
</video>

<script>
  const video = document.querySelector("video");
  document.body.addEventListener("click", () => {
    if (video.requestFullscreen) video.requestFullscreen();
    video.muted = false;
    video.play();
  });
</script>

</body>
</html>
